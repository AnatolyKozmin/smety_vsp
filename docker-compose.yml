services:
  backend:
    build: ./backend
    container_name: smety-backend
    restart: unless-stopped
    environment:
      SMETY_DB: /data/smety.db
    volumes:
      # БД хранится на хосте в ./data — переживает пересборки контейнера
      - ./data:/data
    expose:
      - "8000"
    # наружу бэкенд не выставляется — общается с frontend по внутренней docker-сети
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: smety-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # По умолчанию 8082 — свободный порт на сервере (80/443/8000/8001/18081 уже заняты).
      # Открыт на 0.0.0.0:8082 — доступ напрямую по http://<server>:8082/.
      # Если хотите спрятать за arkadium-edge-nginx (TLS, домен) — поменяйте на "127.0.0.1:8082:80".
      - "${HTTP_PORT:-8082}:80"
